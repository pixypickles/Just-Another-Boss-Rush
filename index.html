<style>

#hud{position:absolute;inset:0;pointer-events:none}.top{position:absolute;left:50%;top:max(10px,env(safe-area-inset-top));transform:translateX(-50%);display:flex;gap:12px;align-items:center;padding:8px 14px;background:#090e18df;border:1px solid #ffffff25;border-radius:999px;font-weight:900}.bossName{color:#ffd88b}.stageNo{color:#8ed8ff}.panel{position:absolute;left:12px;top:62px;width:248px;padding:10px 12px;border-radius:14px;background:#0c111bd9;border:1px solid #ffffff20}.name{font-weight:1000;color:#ffe28b;font-size:17px}.ability{font-size:12px;color:#d7dfed;line-height:1.45;margin-top:3px}.bar{height:10px;background:#ffffff1a;border-radius:999px;overflow:hidden;margin-top:7px;border:1px solid #ffffff20}.fill{height:100%;width:100%;background:linear-gradient(90deg,#4fe58b,#e8f58a)}.bossBar{position:absolute;left:50%;top:58px;transform:translateX(-50%);width:min(520px,62%);height:16px;background:#ffffff1a;border-radius:999px;overflow:hidden;border:1px solid #ffffff28}.bossFill{height:100%;width:100%;background:linear-gradient(90deg,#ff4242,#ffb254)}#notice{position:absolute;left:50%;top:23%;transform:translateX(-50%);font-size:clamp(28px,7vw,64px);font-weight:1000;text-align:center;opacity:0;text-shadow:0 5px 0 #0008,0 0 24px currentColor;transition:opacity .15s}.help{position:absolute;left:12px;bottom:12px;padding:9px 11px;border-radius:12px;background:#0c111bd9;border:1px solid #ffffff20;color:#d7deeb;font-size:12px;line-height:1.45}

#touch{position:absolute;inset:0;z-index:20;pointer-events:none;display:none}#joystick{position:absolute;left:max(18px,env(safe-area-inset-left));bottom:max(18px,env(safe-area-inset-bottom));width:148px;height:148px;border-radius:50%;pointer-events:auto;touch-action:none;background:radial-gradient(circle,#ffffff18 0 34%,#ffffff0d 35% 62%,#ffffff20 63% 65%,#0000 66%);border:2px solid #ffffff55}#stick{position:absolute;left:44px;top:44px;width:60px;height:60px;border-radius:50%;background:linear-gradient(#8ea1c5,#39465f);border:2px solid #ffffffaa;box-shadow:0 8px 18px #0008}.actions{position:absolute;right:max(14px,env(safe-area-inset-right));bottom:max(14px,env(safe-area-inset-bottom));width:226px;height:226px;display:grid;grid-template-columns:repeat(3,70px);grid-template-rows:repeat(3,70px);gap:8px;place-items:center;pointer-events:auto}.tb{width:70px;height:70px;border-radius:50%;border:2px solid #ffffff70;color:#fff;font-weight:1000;font-size:10px;box-shadow:0 6px 0 #05070bbb,0 11px 24px #0007;touch-action:none}.tb b{display:block;font-size:27px}.tb.active{transform:translateY(5px) scale(.94)}#a{grid-column:1;grid-row:2;background:linear-gradient(#ffca68,#994f15)}#b{grid-column:2;grid-row:1;background:linear-gradient(#73d6ff,#17617e)}#c{grid-column:2;grid-row:3;background:linear-gradient(#c19cff,#604094)}#d{grid-column:3;grid-row:2;background:linear-gradient(#8eed9a,#26763a)}
@media (hover:none),(pointer:coarse),(max-width:900px){#touch{display:block}.help{display:none}.panel{top:56px;font-size:11px;width:218px}.bossBar{top:53px;width:46%}}@media(max-aspect-ratio:1.1){#stage{width:100vw;height:100dvh;max-width:none;max-height:none;border-radius:0;border-left:0;border-right:0}.actions{width:202px;height:202px;grid-template-columns:repeat(3,62px);grid-template-rows:repeat(3,62px)}.tb{width:62px;height:62px}#joystick{width:132px;height:132px}#stick{left:39px;top:39px;width:54px;height:54px}}
</style></head>
<body><div id="app"><div id="stage"><canvas id="game" width="1000" height="1000"></canvas><div id="hud">
<div class="top"><span class="stageNo" id="stageNo">BOSS 1 / 5</span><span class="bossName" id="bossName">巨腕トロール・ガンバ</span></div><div class="bossBar"><div class="bossFill" id="bossFill"></div></div>
<div class="panel"><div>操作中：<span class="name" id="heroName">ナイト</span></div><div class="ability" id="ability"></div><div class="bar"><div class="fill" id="hpFill"></div></div><div class="ability" id="hpText"></div></div>
<div id="notice"></div><div class="help">移動：WASD / 矢印　A：J　B：K　C：L　D：I（キャラチェンジ）</div>
<div id="touch"><div id="joystick"><div id="stick"></div></div><div class="actions"><button class="tb" id="a" data-key="KeyJ"><b>A</b>攻撃</button><button class="tb" id="b" data-key="KeyK"><b>B</b>特殊</button><button class="tb" id="c" data-key="KeyL"><b>C</b>補助</button><button class="tb" id="d" data-key="KeyI"><b>D</b>交代</button></div></div>
<div id="start"><div id="card"><h1>3 HEROES<br>FIVE BOSS CHAMBERS</h1><p>画像スプライトで描かれた5体のボスを、ナイト・魔法使い・ヒーラーで突破します。頭は常に画面上、左右の向きだけ反転します。</p><div class="roles"><div><b>ナイト</b>　A：剣の大攻撃　B：後方まで守る盾　C：自己回復・小</div><div><b>魔法使い</b>　A：3方向ファイアボール　B：3方向フリーズ　C：周囲に小竜巻</div><div><b>ヒーラー</b>　A：自分と近くの仲間を中回復　B：誘導ライトボール　C：飛び道具反射壁</div></div><button id="play">封印の間へ入る</button><div class="small">Dボタンで操作キャラを切り替えられます。</div></div></div>
</div></div></div>
<script>
(()=>{'use strict';
const canvas=document.getElementById('game'),ctx=canvas.getContext('2d'),W=1000,H=1000;
const keys=new Set(),pressed=new Set();let running=false,last=0,heroIndex=0,bossIndex=0,transition=0,shake=0,joy={x:0,y:0,id:null};
const shots=[],particles=[],walls=[],slashes=[];
const spriteFiles={
 hero_mage:'assets/hero_mage.png',hero_knight:'assets/hero_knight.png',hero_healer:'assets/hero_healer.png',
 boss_troll_up:'assets/boss_troll_up.png',boss_troll_down:'assets/boss_troll_down.png',
 boss_dracula:'assets/boss_dracula.png',boss_cerberus:'assets/boss_cerberus.png',
 boss_dragon:'assets/boss_dragon.png',boss_demonking:'assets/boss_demonking.png'
};
const sprites={};for(const [k,u] of Object.entries(spriteFiles)){const im=new Image();im.src=u;sprites[k]=im}
function drawSprite(img,x,y,maxW,maxH,flip=false,alpha=1,bob=0){
 if(!img||!img.complete||!img.naturalWidth)return false;
 const s=Math.min(maxW/img.naturalWidth,maxH/img.naturalHeight),w=img.naturalWidth*s,h=img.naturalHeight*s;
 ctx.save();ctx.globalAlpha=alpha;ctx.translate(x,y+bob);ctx.scale(flip?-1:1,1);ctx.drawImage(img,-w/2,-h*.78,w,h);ctx.restore();return true;
}
const ui={stageNo:document.getElementById('stageNo'),bossName:document.getElementById('bossName'),bossFill:document.getElementById('bossFill'),heroName:document.getElementById('heroName'),ability:document.getElementById('ability'),hpFill:document.getElementById('hpFill'),hpText:document.getElementById('hpText'),notice:document.getElementById('notice'),start:document.getElementById('start')};
const clamp=(v,a,b)=>Math.max(a,Math.min(b,v)),norm=(x,y)=>{const d=Math.hypot(x,y)||1;return{x:x/d,y:y/d}},rnd=(a,b)=>a+Math.random()*(b-a);
function notice(t,c='#fff',ms=950){ui.notice.textContent=t;ui.notice.style.color=c;ui.notice.style.opacity=1;clearTimeout(notice.t);notice.t=setTimeout(()=>ui.notice.style.opacity=0,ms)}
function burst(x,y,c,n=15,s=220){for(let i=0;i<n;i++){const a=Math.random()*Math.PI*2,sp=rnd(30,s);particles.push({x,y,vx:Math.cos(a)*sp,vy:Math.sin(a)*sp,life:rnd(.25,.7),max:.7,r:rnd(2,7),c})}}
const heroInfo={knight:{name:'ナイト',hp:540,speed:155,ability:'A：剣・大ダメージ　B：広範囲盾防御　C：自己回復・小'},mage:{name:'魔法使い',hp:340,speed:175,ability:'A：3方向ファイアボール　B：3方向フリーズ　C：小竜巻'},healer:{name:'ヒーラー',hp:390,speed:165,ability:'A：範囲回復・中　B：誘導ライトボール　C：反射壁'}};
class Hero{
 constructor(type,x,y){const i=heroInfo[type];Object.assign(this,{type,x,y,vx:0,vy:0,r:24,hp:i.hp,maxHp:i.hp,cdA:0,cdB:0,cdC:0,inv:0,guard:0,tornado:0,dead:false,facing:{x:1,y:0},attackAnim:0})}
 heal(n){if(this.dead)return;this.hp=Math.min(this.maxHp,this.hp+n);burst(this.x,this.y,'#7dffad',10,120)}
 hurt(n,kx=0,ky=0){if(this.dead||this.inv>0)return;if(this.guard>0)n*=.1;this.hp-=n;this.vx+=kx;this.vy+=ky;this.inv=.3;shake=9;burst(this.x,this.y,'#ff6571',15,220);if(this.hp<=0){this.hp=0;this.dead=true;notice(heroInfo[this.type].name+'が倒れた！','#ff8c97')}}
 update(dt,i){this.cdA=Math.max(0,this.cdA-dt);this.cdB=Math.max(0,this.cdB-dt);this.cdC=Math.max(0,this.cdC-dt);this.inv=Math.max(0,this.inv-dt);this.guard=Math.max(0,this.guard-dt);this.tornado=Math.max(0,this.tornado-dt);this.attackAnim=Math.max(0,this.attackAnim-dt);if(this.dead)return;
  let mx=0,my=0;
  if(i===heroIndex){mx=(keys.has('KeyD')||keys.has('ArrowRight')?1:0)-(keys.has('KeyA')||keys.has('ArrowLeft')?1:0)+joy.x;my=(keys.has('KeyS')||keys.has('ArrowDown')?1:0)-(keys.has('KeyW')||keys.has('ArrowUp')?1:0)+joy.y;if(pressed.has('KeyJ')){pressed.delete('KeyJ');this.a()}if(pressed.has('KeyK')){pressed.delete('KeyK');this.b()}if(pressed.has('KeyL')){pressed.delete('KeyL');this.c()}}
  else{const d=Math.hypot(boss.x-this.x,boss.y-this.y),n=norm(boss.x-this.x,boss.y-this.y);if(this.type==='knight'){mx=n.x;my=n.y;if(d<105&&this.cdA<=0)this.a();if(boss.attack>0&&d<210&&this.cdB<=0)this.b();if(this.hp<this.maxHp*.33&&this.cdC<=0)this.c()}else if(this.type==='mage'){mx=d<290?-n.x*.45:n.x;my=d<290?-n.y*.45:n.y;if(this.cdA<=0)this.a();if(this.cdB<=0&&Math.random()<.018)this.b();if(d<125&&this.cdC<=0)this.c()}else{const low=heroes.filter(h=>!h.dead).sort((a,b)=>a.hp/a.maxHp-b.hp/b.maxHp)[0];if(low&&low.hp/low.maxHp<.7){mx=low.x-this.x;my=low.y-this.y;if(Math.hypot(mx,my)<145&&this.cdA<=0)this.a()}else{mx=-n.x*.28;my=-n.y*.28;if(this.cdB<=0)this.b();if(this.cdC<=0&&boss.volley>0)this.c()}}}
  const has=Math.abs(mx)+Math.abs(my)>.05,n=norm(mx,my),sp=heroInfo[this.type].speed;this.vx+=(has?n.x*sp-this.vx:-this.vx)*Math.min(1,dt*13);this.vy+=(has?n.y*sp-this.vy:-this.vy)*Math.min(1,dt*13);if(has)this.facing=n;this.x=clamp(this.x+this.vx*dt,92,908);this.y=clamp(this.y+this.vy*dt,150,900);
  if(this.tornado>0&&!boss.dead&&Math.hypot(this.x-boss.x,this.y-boss.y)<95+boss.r){boss.hurt(12*dt);boss.vx+=(boss.x-this.x)*dt*.7;boss.vy+=(boss.y-this.y)*dt*.7}
 }
 a(){if(this.cdA>0)return;if(this.type==='knight'){this.cdA=.72;this.attackAnim=.32;const f=this.facing,hx=this.x+f.x*78,hy=this.y+f.y*78;slashes.push({x:this.x,y:this.y,a:Math.atan2(f.y,f.x),life:.24,max:.24});if(Math.hypot(boss.x-hx,boss.y-hy)<boss.r+72){boss.hurt(88);boss.vx+=f.x*170;boss.vy+=f.y*170;shake=14;burst(boss.x,boss.y,'#f4f8ff',28,380)}}else if(this.type==='mage'){this.cdA=.72;tripleShot(this,'fire',560,34);notice('トリプル・ファイア！','#ffad62',450)}else{this.cdA=2.6;for(const h of heroes)if(!h.dead&&Math.hypot(h.x-this.x,h.y-this.y)<145)h.heal(105);notice('ヒールサークル！','#9fffc0',500)}}
 b(){if(this.cdB>0)return;if(this.type==='knight'){this.cdB=3.0;this.guard=1.8;notice('ワイドシールド！','#ccecff')}else if(this.type==='mage'){this.cdB=1.05;tripleShot(this,'freeze',600,13);notice('トリプル・フリーズ！','#bceeff',500)}else{this.cdB=.9;spawnHoming(this);notice('ライトボール！','#fff7ad',450)}}
 c(){if(this.cdC>0)return;if(this.type==='knight'){this.cdC=5.1;this.heal(82);notice('セルフヒール！','#aaffc2')}else if(this.type==='mage'){this.cdC=4.3;this.tornado=2.8;notice('ミニトルネード！','#c6f4ff')}else{this.cdC=5.0;walls.push({owner:this,life:2.8,r:76});notice('リフレクトウォール！','#f5eaff')}}
 draw(i){
  const ctl=i===heroIndex&&!this.dead,img=sprites['hero_'+this.type];
  const flip=boss&&!boss.dead?boss.x<this.x:this.facing.x<0;
  const bob=Math.hypot(this.vx,this.vy)>25?Math.sin(performance.now()/85+i)*3:0;
  ctx.save();ctx.globalAlpha=.22;ctx.fillStyle='#000';ctx.beginPath();ctx.ellipse(this.x,this.y+25,36,13,0,0,Math.PI*2);ctx.fill();
  if(ctl){ctx.strokeStyle='#fff09b';ctx.lineWidth=5;ctx.beginPath();ctx.arc(this.x,this.y+3,48,0,Math.PI*2);ctx.stroke()}
  drawSprite(img,this.x,this.y,112,126,flip,this.dead?.32:1,bob);
  if(this.type==='knight'&&this.attackAnim>0){
    const p=1-this.attackAnim/.32,side=flip?-1:1,angle=(-1.25+p*2.55)*side;
    ctx.save();ctx.translate(this.x,this.y-5+bob);ctx.rotate(angle);ctx.strokeStyle='#8b5a2b';ctx.lineWidth=10;ctx.lineCap='round';
    ctx.beginPath();ctx.moveTo(10,0);ctx.lineTo(45,0);ctx.stroke();ctx.fillStyle='#e9f3ff';ctx.beginPath();ctx.moveTo(40,-8);ctx.lineTo(112,0);ctx.lineTo(40,8);ctx.closePath();ctx.fill();
    ctx.strokeStyle='#ffffffaa';ctx.lineWidth=3;ctx.beginPath();ctx.moveTo(50,-2);ctx.lineTo(103,0);ctx.stroke();ctx.restore();
  }
  if(this.guard>0){ctx.globalAlpha=.34;ctx.fillStyle='#bfe7ff';ctx.beginPath();ctx.arc(this.x,this.y,92,-2.4,2.4);ctx.lineTo(this.x,this.y);ctx.fill();ctx.globalAlpha=1}
  if(this.tornado>0){ctx.globalAlpha=.75;ctx.strokeStyle='#d3f7ff';ctx.lineWidth=7;for(let r=42;r<82;r+=13){ctx.beginPath();ctx.arc(this.x,this.y,r,performance.now()/210+r,performance.now()/210+r+4.6);ctx.stroke()}ctx.globalAlpha=1}
  ctx.restore();
 }
}
function tripleShot(h,type,speed,damage){const base=Math.atan2(h.facing.y,h.facing.x);[-.22,0,.22].forEach(a=>{const ang=base+a;shots.push({team:'hero',type,x:h.x+Math.cos(ang)*32,y:h.y+Math.sin(ang)*32,vx:Math.cos(ang)*speed,vy:Math.sin(ang)*speed,r:type==='fire'?13:9,life:1.8,damage})})}
function spawnHoming(h){const n=h.facing;shots.push({team:'hero',type:'holy',x:h.x+n.x*30,y:h.y+n.y*30,vx:n.x*330,vy:n.y*330,r:11,life:3.1,damage:22,homing:true})}
const bossDefs=[
{name:'巨腕トロール・ガンバ',kind:'troll',hp:1400,speed:90,pattern:'slam'},
{name:'夜侯ドラキュラ',kind:'dracula',hp:1500,speed:132,pattern:'fire'},
{name:'冥府の番犬ケルベロス',kind:'cerberus',hp:1750,speed:150,pattern:'all'},
{name:'深紅竜ヴォルガノス',kind:'dragon',hp:2050,speed:118,pattern:'dragon'},
{name:'終焉の魔王アビス',kind:'demonking',hp:2700,speed:132,pattern:'final'}];
class Boss{
 constructor(def){Object.assign(this,{...def,maxHp:def.hp,x:735,y:510,vx:0,vy:0,r:def.kind==='dragon'?82:def.kind==='cerberus'?76:def.kind==='troll'?70:64,cd:1.1,attack:0,volley:0,slow:0,dead:false,phase:0,inv:0})}
 hurt(n){if(this.dead)return;this.inv=.12;this.hp-=n;burst(this.x,this.y,'#ffd29d',5,150);if(this.hp<=0){this.hp=0;this.dead=true;bossDefeated()}}
 update(dt){if(this.dead)return;this.inv=Math.max(0,this.inv-dt);this.cd-=dt;this.attack=Math.max(0,this.attack-dt);this.volley=Math.max(0,this.volley-dt);this.slow=Math.max(0,this.slow-dt);const alive=heroes.filter(h=>!h.dead);if(!alive.length)return;const target=alive.sort((a,b)=>Math.hypot(a.x-this.x,a.y-this.y)-Math.hypot(b.x-this.x,b.y-this.y))[0],n=norm(target.x-this.x,target.y-this.y),d=Math.hypot(target.x-this.x,target.y-this.y),sp=this.speed*(this.slow>0?.45:1);this.vx+=(n.x*sp-this.vx)*Math.min(1,dt*3.5);this.vy+=(n.y*sp-this.vy)*Math.min(1,dt*3.5);if(d<this.r+28){target.hurt(42+bossIndex*7,-n.x*210,-n.y*210);this.vx*=-.35;this.vy*=-.35}if(this.cd<=0){this.special(target);this.cd=Math.max(.72,2.5-bossIndex*.18)}this.x=clamp(this.x+this.vx*dt,105,895);this.y=clamp(this.y+this.vy*dt,160,885)}
 radial(count,speed,type='enemy',damage=30,spread=0){for(let i=0;i<count;i++){const a=Math.PI*2*i/count+spread;shots.push({team:'boss',type,x:this.x,y:this.y,vx:Math.cos(a)*speed,vy:Math.sin(a)*speed,r:12,life:3.2,damage})}}
 aimed(target,count=3,speed=330,type='enemy',damage=34){const base=Math.atan2(target.y-this.y,target.x-this.x);for(let i=0;i<count;i++){const a=base+(i-(count-1)/2)*.16;shots.push({team:'boss',type,x:this.x,y:this.y,vx:Math.cos(a)*speed,vy:Math.sin(a)*speed,r:13,life:3,damage})}}
 special(target){this.phase++;if(this.pattern==='slam'){this.slam(72)}else if(this.pattern==='fire'){this.volley=.8;this.aimed(target,5,350,'enemy',34)}else if(this.pattern==='all'){if(this.phase%2)this.slam(78);else{this.volley=1;this.radial(12,300,'enemy',38,performance.now()/900)}}else if(this.pattern==='dragon'){if(this.phase%3===0)this.slam(86);else{this.volley=1;this.aimed(target,7,390,'enemy',42)}}else{if(this.phase%3===0)this.slam(96);else if(this.phase%3===1){this.volley=1;this.radial(16,340,'enemy',44,performance.now()/700)}else{this.volley=1;this.aimed(target,9,420,'enemy',48)}}}
 slam(dmg){this.attack=.75;setTimeout(()=>{if(!running||this.dead)return;for(const h of heroes)if(!h.dead&&Math.hypot(h.x-this.x,h.y-this.y)<205)h.hurt(dmg);burst(this.x,this.y,'#ffd08a',42,470);shake=22},430)}
 draw(){
  const alive=heroes.filter(h=>!h.dead),target=alive.length?alive.reduce((a,b)=>Math.hypot(a.x-this.x,a.y-this.y)<Math.hypot(b.x-this.x,b.y-this.y)?a:b):null;
  const flip=target?target.x<this.x:false;let key='boss_'+this.kind;
  if(this.kind==='troll')key=this.attack>0&&this.attack<.48?'boss_troll_down':'boss_troll_up';
  const sizes={troll:[220,250],dracula:[190,220],cerberus:[250,215],dragon:[280,250],demonking:[210,238]},sz=sizes[this.kind]||[210,230];
  const bob=this.kind==='dracula'?Math.sin(performance.now()/170)*7:Math.sin(performance.now()/240)*2;
  ctx.save();ctx.globalAlpha=.28;ctx.fillStyle='#000';ctx.beginPath();ctx.ellipse(this.x,this.y+44,sz[0]*.34,21,0,0,Math.PI*2);ctx.fill();
  drawSprite(sprites[key],this.x,this.y,sz[0],sz[1],flip,this.inv>0?.55:1,bob);
  if(this.attack>0){ctx.globalAlpha=.2;ctx.fillStyle='#ff5f45';ctx.beginPath();ctx.arc(this.x,this.y,205,0,Math.PI*2);ctx.fill()}ctx.restore();
 }
}
let heroes=[],boss;
function setupBattle(){heroes=[new Hero('knight',270,420),new Hero('mage',235,535),new Hero('healer',280,650)];boss=new Boss(bossDefs[bossIndex]);heroIndex=0;shots.length=particles.length=walls.length=slashes.length=0;updateUI();notice('封印の間 '+(bossIndex+1),'#ffd88b',1100)}
function bossDefeated(){transition=2.2;notice('BOSS DEFEATED!','#fff08a',1500);for(const h of heroes)if(!h.dead)h.heal(h.maxHp*.24)}
function nextHero(){for(let k=1;k<=heroes.length;k++){const ni=(heroIndex+k)%heroes.length;if(!heroes[ni].dead){heroIndex=ni;notice(heroInfo[heroes[ni].type].name+'にチェンジ','#aee8ff',600);break}}}
function updateShots(dt){for(let i=shots.length-1;i>=0;i--){const s=shots[i];s.life-=dt;if(s.homing&&!boss.dead){const desired=norm(boss.x-s.x,boss.y-s.y),speed=Math.hypot(s.vx,s.vy),cur=norm(s.vx,s.vy),blend=Math.min(1,dt*4.6),nn=norm(cur.x*(1-blend)+desired.x*blend,cur.y*(1-blend)+desired.y*blend);s.vx=nn.x*speed;s.vy=nn.y*speed}s.x+=s.vx*dt;s.y+=s.vy*dt;if(s.life<=0||s.x<45||s.x>955||s.y<110||s.y>940){shots.splice(i,1);continue}if(s.team==='hero'){if(!boss.dead&&Math.hypot(s.x-boss.x,s.y-boss.y)<s.r+boss.r){boss.hurt(s.damage);if(s.type==='freeze'){boss.slow=2.5;notice('フリーズ！','#bceeff',450)}burst(s.x,s.y,s.type==='fire'?'#ff7d3c':s.type==='holy'?'#fff5a8':'#bceeff',18,250);shots.splice(i,1)}}else{let reflected=false;for(const w of walls){if(w.life>0&&Math.hypot(s.x-w.owner.x,s.y-w.owner.y)<w.r){s.team='hero';s.type='holy';const n=norm(boss.x-s.x,boss.y-s.y);const sp=Math.hypot(s.vx,s.vy)*1.25;s.vx=n.x*sp;s.vy=n.y*sp;s.damage*=1.25;s.homing=true;reflected=true;burst(s.x,s.y,'#f4eaff',12,180);break}}if(reflected)continue;for(const h of heroes){if(!h.dead&&Math.hypot(s.x-h.x,s.y-h.y)<s.r+h.r){h.hurt(s.damage,s.vx*.25,s.vy*.25);shots.splice(i,1);break}}}}}
function updateUI(){const h=heroes[heroIndex];ui.stageNo.textContent='BOSS '+(bossIndex+1)+' / 5';ui.bossName.textContent=bossDefs[bossIndex].name;ui.bossFill.style.width=(boss.hp/boss.maxHp*100)+'%';ui.heroName.textContent=heroInfo[h.type].name;ui.ability.textContent=heroInfo[h.type].ability;ui.hpFill.style.width=(h.hp/h.maxHp*100)+'%';ui.hpText.textContent=Math.ceil(h.hp)+' / '+h.maxHp+' HP'}
function update(dt){if(pressed.has('KeyI')){pressed.delete('KeyI');nextHero()}if(heroes.every(h=>h.dead)){running=false;notice('PARTY DOWN','#ff7a86',1500);setTimeout(()=>ui.start.style.display='grid',1000);return}if(transition>0){transition-=dt;if(transition<=0){bossIndex++;if(bossIndex>=5){running=false;notice('ALL CHAMBERS CLEARED!','#fff08a',2600);setTimeout(()=>ui.start.style.display='grid',1800);bossIndex=0}else setupBattle()}return}heroes.forEach((h,i)=>h.update(dt,i));boss.update(dt);updateShots(dt);for(let i=walls.length-1;i>=0;i--){walls[i].life-=dt;if(walls[i].life<=0)walls.splice(i,1)}for(let i=slashes.length-1;i>=0;i--){slashes[i].life-=dt;if(slashes[i].life<=0)slashes.splice(i,1)}for(let i=particles.length-1;i>=0;i--){const p=particles[i];p.life-=dt;p.x+=p.vx*dt;p.y+=p.vy*dt;p.vx*=.96;p.vy*=.96;if(p.life<=0)particles.splice(i,1)}updateUI()}
function drawDoor(x,dir){ctx.save();ctx.translate(x,525);ctx.fillStyle='#171b22';ctx.fillRect(dir<0?-55:0,-105,55,210);ctx.strokeStyle='#9d8a5c';ctx.lineWidth=9;ctx.strokeRect(dir<0?-55:0,-105,55,210);ctx.strokeStyle='#514833';ctx.lineWidth=6;for(let y=-72;y<=72;y+=36){ctx.beginPath();ctx.moveTo(dir<0?-49:6,y);ctx.lineTo(dir<0?-6:49,y);ctx.stroke()}ctx.fillStyle='#d7b85e';ctx.beginPath();ctx.arc(dir<0?-16:16,0,8,0,Math.PI*2);ctx.fill();
ctx.strokeStyle='#888';ctx.lineWidth=8;ctx.beginPath();ctx.moveTo(dir<0?-52:3,-70);ctx.lineTo(dir<0?-3:52,70);ctx.moveTo(dir<0?-3:52,-70);ctx.lineTo(dir<0?-52:3,70);ctx.stroke();ctx.restore()}
function drawArena(){ctx.fillStyle='#11141a';ctx.fillRect(0,0,W,H);const g=ctx.createRadialGradient(500,520,100,500,520,580);g.addColorStop(0,'#4b4944');g.addColorStop(1,'#25272b');ctx.fillStyle=g;ctx.beginPath();ctx.moveTo(250,120);ctx.lineTo(750,120);ctx.lineTo(930,300);ctx.lineTo(930,750);ctx.lineTo(750,930);ctx.lineTo(250,930);ctx.lineTo(70,750);ctx.lineTo(70,300);ctx.closePath();ctx.fill();ctx.strokeStyle='#b6a472';ctx.lineWidth=16;ctx.stroke();ctx.strokeStyle='#ffffff24';ctx.lineWidth=4;ctx.beginPath();ctx.arc(500,525,95,0,Math.PI*2);ctx.stroke();ctx.beginPath();ctx.moveTo(500,135);ctx.lineTo(500,915);ctx.stroke();for(let i=0;i<20;i++){const a=i*2.399,r=170+(i%5)*65;ctx.fillStyle='#ffffff12';ctx.beginPath();ctx.arc(500+Math.cos(a)*r,525+Math.sin(a)*r,4+(i%3)*2,0,Math.PI*2);ctx.fill()}drawDoor(72,-1);drawDoor(928,1)}
function draw(){ctx.save();if(shake>0){ctx.translate(rnd(-shake,shake),rnd(-shake,shake));shake*=.84}drawArena();for(const w of walls){ctx.save();ctx.translate(w.owner.x,w.owner.y);ctx.globalAlpha=.5;ctx.strokeStyle='#eadcff';ctx.lineWidth=10;ctx.beginPath();ctx.arc(0,0,w.r,-2.2,2.2);ctx.stroke();ctx.restore()}boss.draw();heroes.forEach((h,i)=>h.draw(i));for(const s of shots){ctx.save();ctx.fillStyle=s.type==='fire'?'#ff7c36':s.type==='freeze'||s.type==='ice'?'#aeefff':s.type==='holy'?'#fff6a8':'#ff725e';ctx.shadowBlur=s.type==='holy'?22:12;ctx.shadowColor=ctx.fillStyle;ctx.beginPath();ctx.arc(s.x,s.y,s.r,0,Math.PI*2);ctx.fill();ctx.restore()}for(const q of slashes){const k=clamp(q.life/q.max,0,1);ctx.save();ctx.translate(q.x,q.y);ctx.rotate(q.a);ctx.globalAlpha=k;ctx.strokeStyle='#edf7ff';ctx.lineWidth=15*k+4;ctx.beginPath();ctx.arc(0,0,96,-1.05,1.05);ctx.stroke();ctx.strokeStyle='#9edbff';ctx.lineWidth=5;ctx.beginPath();ctx.arc(0,0,113,-.9,.9);ctx.stroke();ctx.restore()}for(const p of particles){ctx.globalAlpha=clamp(p.life/p.max,0,1);ctx.fillStyle=p.c;ctx.beginPath();ctx.arc(p.x,p.y,p.r,0,Math.PI*2);ctx.fill()}ctx.restore();ctx.globalAlpha=1}
function loop(t){const dt=Math.min(.033,(t-last)/1000||0);last=t;if(running)update(dt);draw();requestAnimationFrame(loop)}
addEventListener('keydown',e=>{if(!keys.has(e.code))pressed.add(e.code);keys.add(e.code);if(['ArrowUp','ArrowDown','ArrowLeft','ArrowRight','Space'].includes(e.code))e.preventDefault()});addEventListener('keyup',e=>keys.delete(e.code));
const joyEl=document.getElementById('joystick'),stick=document.getElementById('stick');function joyMove(e){const r=joyEl.getBoundingClientRect(),p=[...e.changedTouches].find(t=>t.identifier===joy.id);if(!p)return;let x=p.clientX-(r.left+r.width/2),y=p.clientY-(r.top+r.height/2),d=Math.hypot(x,y),m=r.width*.34;if(d>m){x=x/d*m;y=y/d*m}joy.x=x/m;joy.y=y/m;stick.style.transform=`translate(${x}px,${y}px)`}joyEl.addEventListener('touchstart',e=>{const t=e.changedTouches[0];joy.id=t.identifier;joyMove(e);e.preventDefault()},{passive:false});joyEl.addEventListener('touchmove',e=>{joyMove(e);e.preventDefault()},{passive:false});joyEl.addEventListener('touchend',e=>{joy.x=joy.y=0;joy.id=null;stick.style.transform='translate(0,0)';e.preventDefault()},{passive:false});
document.querySelectorAll('.tb').forEach(b=>{const code=b.dataset.key;const down=e=>{if(!keys.has(code))pressed.add(code);keys.add(code);b.classList.add('active');e.preventDefault()},up=e=>{keys.delete(code);b.classList.remove('active');e.preventDefault()};b.addEventListener('touchstart',down,{passive:false});b.addEventListener('touchend',up,{passive:false});b.addEventListener('mousedown',down);b.addEventListener('mouseup',up)});
document.getElementById('play').onclick=()=>{bossIndex=0;setupBattle();running=true;last=performance.now();ui.start.style.display='none'};setupBattle();requestAnimationFrame(loop);
})();
